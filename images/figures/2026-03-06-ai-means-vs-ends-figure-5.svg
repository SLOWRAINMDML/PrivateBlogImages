    <text x="-84" y="-6" fill="#CCFBF1" font-family="'Apple SD Gothic Neo','Noto Sans KR',sans-serif" font-size="30" font-weight="700">운영 이해</text>
    <text x="-138" y="38" fill="#A7F3D0" font-family="'Apple SD Gothic Neo','Noto Sans KR',sans-serif" font-size="20">누가 판단하고 누가 책임지는가</text>
  </g>
