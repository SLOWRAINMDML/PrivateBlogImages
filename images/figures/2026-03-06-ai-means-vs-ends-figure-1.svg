<svg width="1600" height="900" viewBox="0 0 1600 900" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg1" x1="120" y1="120" x2="1480" y2="820" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0F172A" />
      <stop offset="1" stop-color="#0B1F44" />
    </linearGradient>
    <linearGradient id="danger" x1="430" y1="380" x2="1310" y2="244" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F59E0B" />
      <stop offset="1" stop-color="#FB7185" />
    </linearGradient>
    <linearGradient id="good" x1="430" y1="518" x2="1310" y2="656" gradientUnits="userSpaceOnUse">
      <stop stop-color="#22C55E" />
      <stop offset="1" stop-color="#06B6D4" />
    </linearGradient>
  </defs>
  <rect width="1600" height="900" rx="42" fill="url(#bg1)" />
  <rect x="72" y="66" width="1456" height="768" rx="34" fill="#020617" fill-opacity="0.26" stroke="#E2E8F0" stroke-opacity="0.14" />

  <text x="120" y="156" fill="#F8FAFC" font-family="'Apple SD Gothic Neo','Noto Sans KR',sans-serif" font-size="56" font-weight="700">그림 1. 수단 중심 사고와 결과 중심 사고의 갈림길</text>
  <text x="120" y="212" fill="#CBD5E1" font-family="'Apple SD Gothic Neo','Noto Sans KR',sans-serif" font-size="26">같은 도구 도입도 질문의 순서가 다르면 현실의 결과가 달라진다</text>

  <g transform="translate(132 338)">
    <rect width="244" height="156" rx="28" fill="#0F172A" stroke="#93C5FD" stroke-opacity="0.4" />
    <text x="34" y="62" fill="#F8FAFC" font-family="'Apple SD Gothic Neo','Noto Sans KR',sans-serif" font-size="28" font-weight="700">문제 인식</text>
    <text x="34" y="102" fill="#CBD5E1" font-family="'Apple SD Gothic Neo','Noto Sans KR',sans-serif" font-size="20">무엇이 실제 고통인가</text>
  </g>

  <path d="M392 416C540 352 688 290 858 264C992 244 1138 250 1300 278" stroke="url(#danger)" stroke-width="26" stroke-linecap="round" />
  <path d="M392 452C548 528 694 598 860 632C1006 660 1146 654 1300 620" stroke="url(#good)" stroke-width="26" stroke-linecap="round" />

  <g transform="translate(726 246)">
    <circle cx="0" cy="0" r="42" fill="#7C2D12" stroke="#FDBA74" stroke-opacity="0.5" />
    <path d="M-15 0H15M0-15V15" stroke="#FFF7ED" stroke-width="6" stroke-linecap="round" />
  </g>
  <g transform="translate(744 640)">
    <circle cx="0" cy="0" r="42" fill="#14532D" stroke="#86EFAC" stroke-opacity="0.5" />
    <path d="M-16 3L-4 16L18-12" stroke="#DCFCE7" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" />
  </g>

  <g transform="translate(960 184)">
    <rect width="396" height="206" rx="28" fill="#431407" fill-opacity="0.78" stroke="#FDBA74" stroke-opacity="0.4" />
    <text x="34" y="56" fill="#FED7AA" font-family="'Apple SD Gothic Neo','Noto Sans KR',sans-serif" font-size="26" font-weight="700">수단 중심 경로</text>
    <text x="34" y="100" fill="#FFEDD5" font-family="'Apple SD Gothic Neo','Noto Sans KR',sans-serif" font-size="20">도구 도입 → 데모 성공 → 홍보 확대</text>
    <text x="34" y="140" fill="#FDBA74" font-family="'Apple SD Gothic Neo','Noto Sans KR',sans-serif" font-size="20">현장 마찰은 뒤늦게 누적된다</text>
    <text x="34" y="176" fill="#FCA5A5" font-family="'Apple SD Gothic Neo','Noto Sans KR',sans-serif" font-size="20">성과 보고서엔 활동만 남고 신뢰는 줄어든다</text>
  </g>

  <g transform="translate(960 520)">
    <rect width="396" height="206" rx="28" fill="#052E2B" fill-opacity="0.82" stroke="#86EFAC" stroke-opacity="0.4" />
    <text x="34" y="56" fill="#BBF7D0" font-family="'Apple SD Gothic Neo','Noto Sans KR',sans-serif" font-size="26" font-weight="700">결과 중심 경로</text>
    <text x="34" y="100" fill="#DCFCE7" font-family="'Apple SD Gothic Neo','Noto Sans KR',sans-serif" font-size="20">목표 정의 → 현장 재설계 → 품질 검증</text>
    <text x="34" y="140" fill="#A7F3D0" font-family="'Apple SD Gothic Neo','Noto Sans KR',sans-serif" font-size="20">문제 해결률과 신뢰가 결과로 남는다</text>
    <text x="34" y="176" fill="#67E8F9" font-family="'Apple SD Gothic Neo','Noto Sans KR',sans-serif" font-size="20">도구는 수단으로 배치되고 변화가 축적된다</text>
  </g>
